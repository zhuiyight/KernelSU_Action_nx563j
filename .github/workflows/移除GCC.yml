name: Build Kernel SDM845 Optimized
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 优化系统空间
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc
        sudo apt-get autoremove -y
        sudo apt-get clean

    - name: 安装编译依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 default-jdk
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: 设置 ccache 缓存
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: kernel-sdm845-v2-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          kernel-sdm845-v2-${{ github.ref }}-
          kernel-sdm845-v2-

    - name: 下载 Clang r536225
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir clang-aosp
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz
        tar -C clang-aosp/ -zxf clang-r536225.tar.gz

    - name: 下载内核源码 (Lineage-22.2)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/LineageOS/android_kernel_nubia_sdm845 -b lineage-22.2 android-kernel --depth=1

    - name: 编译内核
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        # 环境变量准备
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=${{ github.actor }}
        export USE_CCACHE=1
        export CCACHE_DIR=~/.ccache

        # 定义编译参数
        MAKE_ARGS="ARCH=arm64 \
                   O=out \
                   CC='ccache clang' \
                   LD=ld.lld \
                   AR=llvm-ar \
                   NM=llvm-nm \
                   OBJCOPY=llvm-objcopy \
                   OBJDUMP=llvm-objdump \
                   STRIP=llvm-strip \
                   LLVM=1 \
                   LLVM_IAS=1 \
                   CLANG_TRIPLE=aarch64-linux-gnu- \
                   CROSS_COMPILE=aarch64-linux-gnu- \
                   CROSS_COMPILE_ARM32=arm-linux-gnueabi-"

        # 1. 生成基础配置 (sdm845_defconfig)
        make $MAKE_ARGS vendor/nubia/sdm845_defconfig

        # 2. 合并 nx616j.config (使用 KCONFIG_ALLCONFIG 方式更稳定)
        # 确保 nx616j.config 存在于源码路径
        cp arch/arm64/configs/vendor/nubia/nx616j.config out/.config_fragment
        make $MAKE_ARGS KCONFIG_ALLCONFIG=out/.config_fragment alldefconfig

        # 3. 正式编译 (使用 nproc 自动分配核心)
        make -j$(nproc --all) $MAKE_ARGS || (tail -n 100 out/build.log && exit 1)

    - name: 检查并打包产物
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out/arch/arm64/boot/
        FILES="Image.gz Image.gz-dtb Image Image-dtb dtbo.img"
        FOUND=false
        for f in $FILES; do
          if [ -f "$f" ]; then
            echo "Found kernel file: $f"
            zip -j "Kernel_NX616J_${{ github.run_id }}.zip" "$f"
            FOUND=true
          fi
        done
        
        if [ "$FOUND" = false ]; then
          echo "Error: No kernel image found!" && exit 1
        fi

    - name: 上传产物 (v4)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-SDM845-NX616J
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/*.zip
